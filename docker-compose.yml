services:
  postgres:
    image: postgres:latest
    container_name: postgres
    environment:
      - POSTGRES_PASSWORD=password
      - POSTGRES_USER=postgres
      - POSTGRES_DB=postgres
  redis:
    image: redis:latest
    container_name: redis
  nginx:
    build:
      context: ./nginx
      dockerfile: dockerfile.dev
    ports:
      - "3050:80"
  client:
    build:
      context: ./client
      dockerfile: dockerfile.dev
    volumes:
      - /app/node_modules
      - ./client:/app
  api:
    build:
      context: ./server
      dockerfile: dockerfile.dev
    volumes:
      - /app/node_modules
      - ./server:/app
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PGHOST=postgres
      - PGPORT=5432
      - PGDATABASE=postgres
      - PGUSER=postgres
      - PGPASSWORD=postgres_password
  worker:
    build:
      context: ./worker
      dockerfile: dockerfile.dev
    volumes:
      - /app/node_modules
      - ./worker:/app
